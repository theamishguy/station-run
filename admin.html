<!DOCTYPE html>
<html>
<head>
  <title>Admin - Station Run</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    #loginBox {
      width: 300px;
      margin: 100px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #adminPanel {
      display: none;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f28c28;
      color: white;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    .saveBtn {
      background: #28a745;
      color: white;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin-right: 5px;
    }

    .deleteBtn {
      background: #d9534f;
      color: white;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    #topBar {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    #downloadBtn {
      background: #0078d4;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>

  <input type="password" id="password" placeholder="Password">

  <button onclick="login()" style="width:100%; padding:10px;">
    Login
  </button>
</div>

<div id="adminPanel">

  <h1>Station Run - Admin Panel</h1>

  <div id="topBar">
    <button id="downloadBtn">Download Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Stage</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBil1-SwOxzF327m1dNN81Ww2Z8EhgzwGo",
  authDomain: "station-run.firebaseapp.com",
  projectId: "station-run",
  storageBucket: "station-run.firebasestorage.app",
  messagingSenderId: "677186400632",
  appId: "1:677186400632:web:674e415244cb8eed10988d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tableBody = document.getElementById("tableBody");

// SIMPLE ADMIN PASSWORD
// CHANGE THIS
const ADMIN_PASSWORD = "stationadmin";

window.login = function() {

  const pass = document.getElementById("password").value;

  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    loadList();
  }
  else {
    alert("Wrong password");
  }
}

async function loadList() {

  tableBody.innerHTML = "";

  const snapshot = await getDocs(collection(db, "stages"));

  let rows = [];

  snapshot.forEach(docSnap => {
    rows.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  rows.sort((a, b) => a.stage - b.stage);

  rows.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.stage}</td>

      <td>
        <input value="${row.assignedTo || ""}" id="name-${row.id}">
      </td>

      <td>
        <input value="${row.email || ""}" id="email-${row.id}">
      </td>

      <td>
        <input value="${row.tel || ""}" id="tel-${row.id}">
      </td>

      <td>
        <button class="saveBtn" data-id="${row.id}">
          Save
        </button>

        <button class="deleteBtn" data-id="${row.id}">
          Delete
        </button>
      </td>
    `;

    tableBody.appendChild(tr);

    const saveBtn = tr.querySelector(".saveBtn");
    const deleteBtn = tr.querySelector(".deleteBtn");

    saveBtn.onclick = async () => {

      const name = document.getElementById(`name-${row.id}`).value;
      const email = document.getElementById(`email-${row.id}`).value;
      const tel = document.getElementById(`tel-${row.id}`).value;

      await updateDoc(doc(db, "stages", row.id), {
        assignedTo: name,
        email: email,
        tel: tel
      });

      alert("Saved!");
    };

    deleteBtn.onclick = async () => {

      if (!confirm("Delete this registration?")) return;

      await updateDoc(doc(db, "stages", row.id), {
        assignedTo: "",
        email: "",
        tel: ""
      });

      loadList();
    };

  });
}

// DOWNLOAD EXCEL/CSV
// Opens directly in Excel

document.getElementById("downloadBtn").onclick = async () => {

  const snapshot = await getDocs(collection(db, "stages"));

  let rows = [];

  snapshot.forEach(docSnap => {
    rows.push(docSnap.data());
  });

  rows.sort((a,b) => a.stage - b.stage);

  let csv = "Stage,Name,Email,Phone\n";

  rows.forEach(r => {
    csv += `${r.stage},"${r.assignedTo || ""}","${r.email || ""}","${r.tel || ""}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "station-run-list.csv";
  a.click();

  URL.revokeObjectURL(url);
};

</script>

</body>
</html>
