<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Station Run</title>

<style>
/* =========================
   FONTS
========================= */
@font-face {
  font-family: "arboria-bold";
  src: url("fonts/arboria-bold.ttf") format("truetype");
}
@font-face {
  font-family: "arboria-light";
  src: url("fonts/arboria-light.ttf") format("truetype");
}

body{
  margin:0;
  background:#111;
  overflow-x:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   MAIN CANVAS
========================= */

#mainCanvas{
  position:relative;
  width:100%;
}

/* =========================
   MAP LAYER (BACK)
========================= */

#mapContainer{
  position:absolute;

  /* ADJUST THESE TO ALIGN MAP */
  top:-22%;
  left:7%;

  width:90%;
  

  z-index:1;
  aspect-ratio: 3841 / 5863;
  overflow:hidden;
}

#mapImage{
  position:absolute;

  /* ADJUST THESE TO ALIGN SVG */
  width:100%;
  left:0%;
  top:38.4%;

  display:block;

  pointer-events:none;
}

/* =========================
   FOREGROUND ARTWORK
========================= */

#overlayImage{
  position:relative;

  width:100%;
  margin-left: 0%;
  display:block;

  z-index:2;

  pointer-events:none;
}

/* =========================
   BUTTON LAYER
========================= */

#buttonLayer{
  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100%;

  z-index:10;
}

/* =========================
   STAGE BUTTONS
========================= */

.stage{
  position:absolute;

  width:clamp(32px, 2.2vw, 44px);
  height:clamp(32px, 2.2vw, 44px);

  border-radius:50%;
  border:3px solid #f28c28;

  background:white;
  color:#333;

  font-weight:bold;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transform:translate(-50%, -50%);

  box-shadow:0 3px 8px rgba(0,0,0,0.25);

  transition:0.2s;

  z-index:20;
}

.stage:hover{
  transform:translate(-50%, -50%) scale(1.1);
}

.taken{
  background:#cfcfcf;
  border-color:#999;
  cursor:not-allowed;
}

/* =========================
   TOP UI
========================= */

#titleImage{
  position:absolute;

  top:12%;
  left:38%;

  transform:translateX(-50%);

  width:35%;

  z-index:30;

  pointer-events:none;
}

#topLogos{
  position:absolute;

  top:2%;
  left:3%;

  width:18%;

  z-index:30;

  pointer-events:none;
}

#scrollArrow{
  position:absolute;

  top:38%;
  right:7%;

  transform:translateX(-50%);

  width:10%;

  z-index:30;

  pointer-events:none;

  animation:bounce 2s infinite;
}

#bottomLogos{
  position:absolute;

  bottom:3%;
  left:50%;

  transform:translateX(-50%);

  width:50%;

  z-index:30;

  pointer-events:none;
}

/* =========================
   POPUP
========================= */

#formPopup{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.6);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:9999;
}

#formBox{
  background:white;

  width:320px;

  padding:25px;

  border-radius:10px;

  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#formBox input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  box-sizing:border-box;
}

#confirmBtn{
  width:100%;
  padding:10px;

  background:#f28c28;

  border:none;

  color:white;

  font-weight:bold;

  cursor:pointer;
}

#cancelBtn{
  width:100%;
  padding:8px;

  margin-top:10px;

  border:none;

  cursor:pointer;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes bounce {

  0%,20%,50%,80%,100%{
    transform:translateX(-50%) translateY(0);
  }

  40%{
    transform:translateX(-50%) translateY(-10px);
  }

  60%{
    transform:translateX(-50%) translateY(-5px);
  }
}
/* =========================
   TEXT
========================= */
#infoSection{
  background:#111;

  color:white;

  padding:80px 10%;

  font-size:24px;

  line-height:1.6;

  text-align:center;
}

#infoText {

  position: absolute;

  top: 25%;
  right: 2%;

  width: 30%;

  color: white;

  font-size: 32px;

  line-height: 1.2;

  text-align: center;

  font-family: "arboria-light";

  z-index: 30;
 }
#infoText2 {

  position: absolute;

  top: 36%;
  right: 2%;

  width: 30%;

  color: white;

  font-size: 32px;

  line-height: 1.5;

  text-align: center;

  font-family: "arboria-bold";

  z-index: 30;
 }
}

</style>
</head>

<body>


<div id="mainCanvas">

  <!-- MAP -->
  <div id="mapContainer">
    <img id="mapImage" src="map.svg">
  </div>

  <!-- FOREGROUND -->
  <img id="overlayImage" src="background.webp">

  <!-- BUTTONS -->
  <div id="buttonLayer"></div>

  <!-- TOP UI -->
  <img id="titleImage" src="title.svg">

  <img id="topLogos" src="logostop.svg">

  <img id="scrollArrow" src="arrow.svg">

  <!-- BOTTOM LOGOS -->
  <img id="bottomLogos" src="logosbottom.svg">

  <!-- TEXT -->
  <section id="infoText">
  Klicken Sie auf die Nummer<br>
  der Station in der Sie laufen möchten.<br><br>

  Geben Sie die gewünschten Daten ein<br>
  und drücken Sie auf “CONFIRMAR”.
  </section>

<section id="infoText2">
  Weitere Informationen:
</section>

 

</div>



<!-- POPUP -->

<div id="formPopup">

  <div id="formBox">

    <h2 id="stageTitle">Stage</h2>

    <label>Name</label>
    <input id="name" type="text">

    <label>Email (optionell)</label>
    <input id="email" type="text">

    <label>Telefonnummer</label>
    <input id="tel" type="text">

    <button id="confirmBtn">
      Konfirmieren
    </button>

    <button id="cancelBtn">
      Abbrechen
    </button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBil1-SwOxzF327m1dNN81Ww2Z8EhgzwGo",
  authDomain: "station-run.firebaseapp.com",
  projectId: "station-run",
  storageBucket: "station-run.firebasestorage.app",
  messagingSenderId: "677186400632",
  appId: "1:677186400632:web:674e415244cb8eed10988d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   ELEMENTS
========================= */

const buttonLayer = document.getElementById("buttonLayer");

let selectedDoc = null;

/* =========================
   STAGE POSITIONS
========================= */

const positions = {

  1: { top: "19.84%", left: "76.74%" },
  2: { top: "21.64%", left: "74.40%" },
  3: { top: "20.35%", left: "71.41%" },
  4: { top: "22.43%", left: "70.35%" },
  5: { top: "21.67%", left: "66.26%" },
  6: { top: "23.85%", left: "66.32%" },
  7: { top: "23.16%", left: "62.38%" },
  8: { top: "25.28%", left: "62.15%" },
  9: { top: "24.45%", left: "58.22%" },
  10: { top: "26.63%", left: "58.56%" },
  11: { top: "25.56%", left: "54.98%" },
  12: { top: "27.77%", left: "55.32%" },
  13: { top: "26.63%", left: "51.79%" },
  14: { top: "28.91%", left: "51.45%" },
  15: { top: "27.83%", left: "48.44%" },
  16: { top: "30.17%", left: "48.50%" },
  17: { top: "28.94%", left: "45.49%" },
  18: { top: "31.18%", left: "46.01%" },
  19: { top: "31.53%", left: "42.59%" },
  20: { top: "32.32%", left: "46.18%" },
  21: { top: "33.14%", left: "42.59%" },
  22: { top: "34.31%", left: "46.41%" },
  23: { top: "35.26%", left: "42.48%" },
  24: { top: "35.99%", left: "46.35%" },
  25: { top: "37.03%", left: "42.53%" },
  26: { top: "37.60%", left: "46.53%" },
  27: { top: "39.68%", left: "45.49%" },
  28: { top: "39.90%", left: "42.25%" },
  29: { top: "37.98%", left: "39.70%" },
  30: { top: "39.93%", left: "37.67%" },
  31: { top: "38.01%", left: "35.47%" },
  32: { top: "40.09%", left: "33.22%" },
  33: { top: "37.94%", left: "29.80%" },
  34: { top: "40.12%", left: "27.89%" },
  35: { top: "37.91%", left: "24.88%" },
  36: { top: "40.28%", left: "23.15%" },
  37: { top: "38.13%", left: "20.83%" },
  38: { top: "36.62%", left: "17.13%" },
  39: { top: "35.48%", left: "22.11%" },
  40: { top: "33.84%", left: "20.60%" }

};

/* =========================
   LOAD STAGES
========================= */

async function loadStages(){

  const snapshot = await getDocs(collection(db,"stages"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const stage = data.stage;

    const btn = document.createElement("div");

    btn.className = "stage";

    if(data.assignedTo){
      btn.classList.add("taken");
    }

    btn.innerText = stage;

    const pos = positions[stage];

    if(pos){
      btn.style.top = pos.top;
      btn.style.left = pos.left;
    }

    btn.onclick = () => {

      if(data.assignedTo) return;

      selectedDoc = docSnap.id;

      document.getElementById("stageTitle").innerText =
        "Station " + stage;

      document.getElementById("formPopup").style.display = "flex";

      document.body.style.overflow = "hidden";
    };

    buttonLayer.appendChild(btn);

  });

}

/* =========================
   CLOSE POPUP
========================= */

document.getElementById("cancelBtn").onclick = () => {

  document.getElementById("formPopup").style.display = "none";

  document.body.style.overflow = "";
};

/* =========================
   SAVE BOOKING
========================= */

document.getElementById("confirmBtn").onclick = async () => {

  const name =
    document.getElementById("name").value;

  const email =
    document.getElementById("email").value;

  const tel =
    document.getElementById("tel").value;

  if(!name || !tel){

    alert("Name and phone required");

    return;
  }

  await updateDoc(doc(db,"stages",selectedDoc),{

    assignedTo:name,
    email:email,
    tel:tel

  });

  alert("Reserved!");

  location.reload();
};

/* =========================
   POSITION LOGGER
========================= */

document.getElementById("buttonLayer")
.addEventListener("click",(e)=>{

  const rect =
    buttonLayer.getBoundingClientRect();

  const x =
    ((e.clientX - rect.left) / rect.width) * 100;

  const y =
    ((e.clientY - rect.top) / rect.height) * 100;

  console.log(
    `top: "${y.toFixed(2)}%", left: "${x.toFixed(2)}%"`
  );

});

/* =========================
   START
========================= */

loadStages();

</script>

</body>
</html>
