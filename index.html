<!DOCTYPE html>
<html lang="en">
<head>
<script>

const isMobile =
  /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i
  .test(navigator.userAgent);

if(isMobile || window.innerWidth < 900){
  window.location.href = "mobile.html";
}

</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Station Run</title>

<style>
/* =========================
   FONTS
========================= */
@font-face {
  font-family: "arboria-bold";
  src: url("fonts/arboria-bold.ttf") format("truetype");
}
@font-face {
  font-family: "arboria-light";
  src: url("fonts/arboria-light.ttf") format("truetype");
}

body{
  margin:0;
  background:#111;
  overflow-x:hidden;
  overflow-y:auto;
  font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   MAIN CANVAS
========================= */

#mainCanvas{

  position:relative;

  width:1920px;
  height:2931px;

  transform-origin: top left;
}

/* =========================
   MAP LAYER (BACK)
========================= */

#mapContainer{
  position:absolute;

  /* ADJUST THESE TO ALIGN MAP */
  top:-22%;
  left:7%;

  width:90%;
  

  z-index:1;
  aspect-ratio: 3841 / 5863;
  overflow:hidden;
}

#mapImage{
  position:absolute;

  /* ADJUST THESE TO ALIGN SVG */
  width:100%;
  left:0%;
  top:38.4%;

  display:block;

  pointer-events:none;
}

#viewport{

  position:relative;

  width:100%;
  height:auto;

  overflow-x:hidden;
  overflow-y:auto;

  background:#111;
}

/* =========================
   FOREGROUND ARTWORK
========================= */

#overlayImage{
  position:relative;

  width:100%;
  margin-left: 0%;
  display:block;

  z-index:2;

  pointer-events:none;
}

/* =========================
   BUTTON LAYER
========================= */

#buttonLayer{
  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100%;

  z-index:10;
}

/* =========================
   STAGE BUTTONS
========================= */

.stage{
  position:absolute;

  width:44px;
  height:44px;

  border-radius:50%;
  border:3px solid #f28c28;

  background:white;
  color:#333;

  font-weight:bold;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transform:translate(-50%, -50%);

  box-shadow:0 3px 8px rgba(0,0,0,0.25);

  transition:0.2s;

  z-index:20;
}

.stage:hover{
  transform:translate(-50%, -50%) scale(1.1);
}

.taken{
  background:#cfcfcf;
  border-color:#999;
  cursor:not-allowed;
}

/* =========================
   TOP UI
========================= */

#titleImage{
  position:absolute;

  top:12%;
  left:38%;

  transform:translateX(-50%);

  width:35%;

  z-index:30;

  pointer-events:none;
}

#topLogos{
  position:absolute;

  top:2%;
  left:3%;

  width:18%;

  z-index:30;

  pointer-events:none;
}

#scrollArrow{
  position:absolute;

  top:38%;
  right:7%;

  transform:translateX(-50%);

  width:10%;

  z-index:30;

  pointer-events:none;

  animation:bounce 2s infinite;
}

#bottomLogos{
  position:absolute;

  bottom:3%;
  left:50%;

  transform:translateX(-50%);

  width:50%;

  z-index:30;

  pointer-events:none;
}

/* =========================
   POPUP
========================= */

#formPopup{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.6);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:9999;
}

#formBox{
  background:white;

  width:320px;

  padding:25px;

  border-radius:10px;

  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#formBox input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  box-sizing:border-box;
}

#confirmBtn{
  width:100%;
  padding:10px;

  background:#f28c28;

  border:none;

  color:white;

  font-weight:bold;

  cursor:pointer;
}

#cancelBtn{
  width:100%;
  padding:8px;

  margin-top:10px;

  border:none;

  cursor:pointer;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes bounce {

  0%,20%,50%,80%,100%{
    transform:translateX(-50%) translateY(0);
  }

  40%{
    transform:translateX(-50%) translateY(-10px);
  }

  60%{
    transform:translateX(-50%) translateY(-5px);
  }
}
/* =========================
   TEXT
========================= */
#infoSection{
  background:#111;

  color:white;

  padding:80px 10%;

  font-size:24px;

  line-height:1.6;

  text-align:center;
}

#infoText {

  position: absolute;

  top: 25%;
  right: 2%;

  width: 30%;

  color: white;

  font-size: 32px;

  line-height: 1.2;

  text-align: center;

  font-family: "arboria-light";

  z-index: 30;
 }
#infoText2 {

  position: absolute;

  top: 36%;
  right: 2%;

  width: 30%;

  color: white;

  font-size: 32px;

  line-height: 1.5;

  text-align: center;

  font-family: "arboria-bold";

  z-index: 30;
 }

}

</style>
</head>

<body>


<div id="viewport">

<div id="mainCanvas">

  <!-- MAP -->
  <div id="mapContainer">
    <img id="mapImage" src="map.svg">
  </div>

  <!-- FOREGROUND -->
  <img id="overlayImage" src="background.webp">

  <!-- BUTTONS -->
  <div id="buttonLayer"></div>

  <!-- TOP UI -->
  <img id="titleImage" src="title.svg">

  <img id="topLogos" src="logostop.svg">

  <img id="scrollArrow" src="arrow.svg">

  <!-- BOTTOM LOGOS -->
  <img id="bottomLogos" src="logosbottom.svg">

  <!-- TEXT -->
  <section id="infoText">
  Klicken Sie auf die Nummer<br>
  der Station in der Sie laufen möchten.<br><br>

  Geben Sie die gewünschten Daten ein<br>
  und drücken Sie auf “CONFIRMAR”.
  </section>

<section id="infoText2">
  Weitere Informationen:
</section>

 

</div>



<!-- POPUP -->

<div id="formPopup">

  <div id="formBox">

    <h2 id="stageTitle">Stage</h2>

    <label>Name</label>
    <input id="name" type="text">

    <label>Email (optionell)</label>
    <input id="email" type="text">

    <label>Telefonnummer</label>
    <input id="tel" type="text">

    <button id="confirmBtn">
      Konfirmieren
    </button>

    <button id="cancelBtn">
      Abbrechen
    </button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBil1-SwOxzF327m1dNN81Ww2Z8EhgzwGo",
  authDomain: "station-run.firebaseapp.com",
  projectId: "station-run",
  storageBucket: "station-run.firebasestorage.app",
  messagingSenderId: "677186400632",
  appId: "1:677186400632:web:674e415244cb8eed10988d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   ELEMENTS
========================= */

const buttonLayer = document.getElementById("buttonLayer");

let selectedDoc = null;

/* =========================
   STAGE POSITIONS
========================= */

const positions = {

  1: { top: "17.00%", left: "80.28%" },
  2: { top: "16.94%", left: "75.68%" },
  3: { top: "20.37%", left: "75.14%" },
  4: { top: "18.32%", left: "71.58%" },
  5: { top: "21.45%", left: "71.95%" },
  6: { top: "19.69%", left: "68.03%" },
  7: { top: "22.76%", left: "68.08%" },
  8: { top: "21.27%", left: "64.25%" },
  9: { top: "24.19%", left: "64.25%" },
  10: { top: "22.70%", left: "60.20%" },
  11: { top: "25.71%", left: "60.61%" },
  12: { top: "24.28%", left: "56.83%" },
  13: { top: "27.47%", left: "57.01%" },
  14: { top: "25.77%", left: "52.78%" },
  15: { top: "28.85%", left: "53.19%" },
  16: { top: "27.32%", left: "49.36%" },
  17: { top: "28.79%", left: "46.99%" },
  18: { top: "30.81%", left: "50.73%" },
  19: { top: "32.22%", left: "46.72%" },
  20: { top: "33.59%", left: "50.68%" },
  21: { top: "35.17%", left: "47.04%" },
  22: { top: "36.39%", left: "50.68%" },
  23: { top: "37.65%", left: "47.09%" },
  24: { top: "40.18%", left: "49.18%" },
  25: { top: "40.57%", left: "46.17%" },
  26: { top: "38.00%", left: "43.62%" },
  27: { top: "40.57%", left: "41.62%" },
  28: { top: "37.88%", left: "39.48%" },
  29: { top: "40.54%", left: "37.25%" },
  30: { top: "37.88%", left: "35.02%" },
  31: { top: "40.57%", left: "32.83%" },
  32: { top: "37.88%", left: "30.69%" },
  33: { top: "40.57%", left: "28.46%" },
  34: { top: "38.03%", left: "26.91%" },
  35: { top: "39.14%", left: "22.91%" },
  36: { top: "37.17%", left: "22.68%" },
  37: { top: "35.77%", left: "26.87%" },
  38: { top: "34.42%", left: "22.72%" },
  39: { top: "34.39%", left: "28.78%" },
  40: { top: "34.45%", left: "19.90%" }

};

/* =========================
   LOAD STAGES
========================= */

async function loadStages(){

  const snapshot = await getDocs(collection(db,"stages"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const stage = data.stage;

    const btn = document.createElement("div");

    btn.className = "stage";

    if(data.assignedTo){
      btn.classList.add("taken");
    }

    btn.innerText = stage;

    const pos = positions[stage];

    if(pos){
      btn.style.top = pos.top;
      btn.style.left = pos.left;
    }

    btn.onclick = () => {

      if(data.assignedTo) return;

      selectedDoc = docSnap.id;

      document.getElementById("stageTitle").innerText =
        "Station " + stage;

      document.getElementById("formPopup").style.display = "flex";

      document.body.style.overflow = "hidden";
    };

    buttonLayer.appendChild(btn);

  });

}

/* =========================
   CLOSE POPUP
========================= */

document.getElementById("cancelBtn").onclick = () => {

  document.getElementById("formPopup").style.display = "none";

  document.body.style.overflow = "";
};

/* =========================
   SAVE BOOKING
========================= */

document.getElementById("confirmBtn").onclick = async () => {

  const name =
    document.getElementById("name").value;

  const email =
    document.getElementById("email").value;

  const tel =
    document.getElementById("tel").value;

  if(!name || !tel){

    alert("Name and phone required");

    return;
  }

  await updateDoc(doc(db,"stages",selectedDoc),{

    assignedTo:name,
    email:email,
    tel:tel

  });

  alert("Reserved!");

  location.reload();
};

/* =========================
   POSITION LOGGER
========================= */

document.getElementById("buttonLayer")
.addEventListener("click",(e)=>{

  const rect =
    buttonLayer.getBoundingClientRect();

  const x =
    ((e.clientX - rect.left) / rect.width) * 100;

  const y =
    ((e.clientY - rect.top) / rect.height) * 100;

  console.log(
    `top: "${y.toFixed(2)}%", left: "${x.toFixed(2)}%"`
  );

});

/* =========================
   START
========================= */
function scaleCanvas(){

  const canvas =
    document.getElementById("mainCanvas");

  const viewportWidth =
    window.innerWidth;

  const scale =
    viewportWidth / 1920;

  canvas.style.transform =
    `scale(${scale})`;

  canvas.parentElement.style.height =
    (2931 * scale) + "px";
}

window.addEventListener("resize", scaleCanvas);

scaleCanvas();
loadStages();

</script>
</div>
</div>
</body>
</html>
