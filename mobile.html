<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Station Run Mobile</title>

<style>

/* =========================
   FONTS
========================= */

@font-face {
  font-family: "arboria-bold";
  src: url("fonts/arboria-bold.ttf") format("truetype");
}

@font-face {
  font-family: "arboria-light";
  src: url("fonts/arboria-light.ttf") format("truetype");
}

/* =========================
   BODY
========================= */

html, body{

  margin:0;
  padding:0;

  overflow-x:hidden;
  overflow-y:auto;

  background:#174b55;

  overscroll-behavior-y:none;

  -webkit-overflow-scrolling:touch;
}


/* =========================
   MAIN CANVAS
========================= */

#mainCanvas{

  position:relative;

  width:1080px;
  height:1920px;

  transform-origin: top left;
}
#viewport{

  position:relative;

  width:100%;

  overflow:hidden;

  background:#174b55;
}
/* =========================
   MAP
========================= */

#mapContainer{
  position:absolute;

  top:0%;
  left:0%;

  width:100%;
  height:100%;

  z-index:1;

  overflow:hidden;
}

#mapImage{

  position:absolute;

  width:100%;
  height:100%;

  object-fit:contain;

  left:0%;
  top:-420px;

  pointer-events:none;
}
/* =========================
   FOREGROUND
========================= */

#overlayImage{
  position:absolute;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:2;

  pointer-events:none;
}

/* =========================
   BUTTON LAYER
========================= */

#buttonLayer{
  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100%;

  z-index:10;
}

/* =========================
   STAGE BUTTONS
========================= */

.stage{
  position:absolute;

  width:75px;
  height:75px;

  border-radius:50%;
  border:3px solid #f28c28;

  background:white;
  color:#333;

  font-weight:bold;
  font-size:32px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transform:translate(-50%, -50%);

  box-shadow:0 3px 8px rgba(0,0,0,0.25);

  z-index:20;
}

.taken{
  background:#cfcfcf;
  border-color:#999;
  cursor:not-allowed;
}

/* =========================
   TITLE
========================= */

#titleImage{
  position:absolute;

  top:220px;
  left:370px;

  transform:translateX(-50%);

  width:500px;

  z-index:30;

  pointer-events:none;
}

/* =========================
   TOP LOGOS
========================= */

#topLogos{
  position:absolute;

  top:-1%;
  left:25%;

  transform:translateX(-50%);

  width:40%;

  z-index:30;

  pointer-events:none;
}

/* =========================
   ARROW
========================= */

#scrollArrow{
  position:absolute;

  top:800px;
  left:650px;

  transform:translateX(-50%);

  width:150px;

  z-index:30;

  pointer-events:none;

  animation:bounce 2s infinite;
}

/* =========================
   BOTTOM LOGOS
========================= */

#bottomLogos{
  position:absolute;

  bottom:4%;
  left:50%;

  transform:translateX(-50%);

  width:70%;

  z-index:30;

  pointer-events:none;
}

/* =========================
   TEXT BLOCKS
========================= */

#infoText{
  position:absolute;

  top:800px;
  left:180px;

  width:20%;

  color:white;

  font-size:64px;

  line-height:1.5;

  text-align:center;

  font-family:"arboria-bold";

  z-index:30;
}

#infoText2{
  position:absolute;

  top:46.2%;
  left:17%;

  width:80%;

  color:white;

  font-size:35px;

  line-height:1.1;

  text-align:left;

  font-family:"arboria-light";

  z-index:30;
}

/* =========================
   POPUP
========================= */

#formPopup{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.7);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:9999;
}

#formBox{
  background:white;

  width:85%;

  padding:25px;

  border-radius:12px;

  box-shadow:0 5px 20px rgba(0,0,0,0.3);

  box-sizing:border-box;
}

#formBox input{
  width:100%;

  padding:12px;

  margin-bottom:12px;

  box-sizing:border-box;
}

#confirmBtn{
  width:100%;

  padding:12px;

  background:#f28c28;

  border:none;

  color:white;

  font-weight:bold;

  cursor:pointer;
}

#cancelBtn{
  width:100%;

  padding:10px;

  margin-top:10px;

  border:none;

  cursor:pointer;
}

/* =========================
   ANIMATION
========================= */

@keyframes bounce {

  0%,20%,50%,80%,100%{
    transform:translateX(-50%) translateY(0);
  }

  40%{
    transform:translateX(-50%) translateY(-10px);
  }

  60%{
    transform:translateX(-50%) translateY(-5px);
  }
}

</style>

</head>

<body>
<div id="viewport">
<div id="mainCanvas">

  <!-- MAP -->
  <div id="mapContainer">
    <img id="mapImage" src="mobile_map.svg">
  </div>

  <!-- FOREGROUND -->
  <img id="overlayImage" src="mobile_background.webp">

  <!-- BUTTONS -->
  <div id="buttonLayer"></div>

  <!-- TITLE -->
  <img id="titleImage" src="mobile_title.svg">

  <!-- TOP LOGOS -->
  <img id="topLogos" src="mobile_logostop.svg">

  <!-- ARROW -->
  <img id="scrollArrow" src="mobile_arrow.svg">

  <!-- BOTTOM LOGOS -->
  <img id="bottomLogos" src="mobile_logosbottom.svg">

  <!-- TEXT -->
  <div id="infoText">
    STATIONEN
  </div>

  <div id="infoText2">
    Wählen Sie eine Station<br>
    und füllen Sie die Daten aus.
  </div>

</div>

<!-- POPUP -->

<div id="formPopup">

  <div id="formBox">

    <h2 id="stageTitle">Stage</h2>

    <label>Name</label>
    <input id="name" type="text">

    <label>Email (optionell)</label>
    <input id="email" type="text">

    <label>Telefon</label>
    <input id="tel" type="text">

    <button id="confirmBtn">
      Konfirmieren
    </button>

    <button id="cancelBtn">
      Abbrechen
    </button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBil1-SwOxzF327m1dNN81Ww2Z8EhgzwGo",
  authDomain: "station-run.firebaseapp.com",
  projectId: "station-run",
  storageBucket: "station-run.firebasestorage.app",
  messagingSenderId: "677186400632",
  appId: "1:677186400632:web:674e415244cb8eed10988d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   ELEMENTS
========================= */

const buttonLayer = document.getElementById("buttonLayer");

let selectedDoc = null;

/* =========================
   MOBILE POSITIONS
========================= */

const positions = {

  1:{top:"60%",left:"11%"},
  2:{top:"60%",left:"24%"},
  3:{top:"60%",left:"37%"},
4:{top:"60%",left:"50%"},
5:{top:"60%",left:"63%"},
6:{top:"60%",left:"76%"},
7:{top:"60%",left:"89%"},
8:{top:"65%",left:"11%"},
9:{top:"65%",left:"24%"},
10:{top:"65%",left:"37%"},
11:{top:"65%",left:"50%"},
12:{top:"65%",left:"63%"},
13:{top:"65%",left:"76%"},
14:{top:"65%",left:"89%"},
15:{top:"70%",left:"11%"},
16:{top:"70%",left:"24%"},
17:{top:"70%",left:"37%"},
18:{top:"70%",left:"50%"},
19:{top:"70%",left:"63%"},
20:{top:"70%",left:"76%"},
21:{top:"70%",left:"89%"},
22:{top:"75%",left:"11%"},
23:{top:"75%",left:"24%"},
24:{top:"75%",left:"37%"},
25:{top:"75%",left:"50%"},
26:{top:"75%",left:"63%"},
27:{top:"75%",left:"76%"},
28:{top:"75%",left:"89%"},
29:{top:"80%",left:"11%"},
30:{top:"80%",left:"24%"},
31:{top:"80%",left:"37%"},
32:{top:"80%",left:"50%"},
33:{top:"80%",left:"63%"},
34:{top:"80%",left:"76%"},
35:{top:"80%",left:"89%"},
36:{top:"85%",left:"24%"},
37:{top:"85%",left:"37%"},
38:{top:"85%",left:"50%"},
39:{top:"85%",left:"63%"},
40:{top:"85%",left:"76%"}

  

  // ADD MOBILE POSITIONS HERE

};

/* =========================
   LOAD STAGES
========================= */

async function loadStages(){

  const snapshot = await getDocs(collection(db,"stages"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const stage = data.stage;

    const btn = document.createElement("div");

    btn.className = "stage";

    if(data.assignedTo){
      btn.classList.add("taken");
    }

    btn.innerText = stage;

    const pos = positions[stage];

    if(pos){
      btn.style.top = pos.top;
      btn.style.left = pos.left;
    }

    btn.onclick = () => {

      if(data.assignedTo) return;

      selectedDoc = docSnap.id;

      document.getElementById("stageTitle").innerText =
        "Station " + stage;

      document.getElementById("formPopup").style.display = "flex";

      document.body.style.overflow = "hidden";
    };

    buttonLayer.appendChild(btn);

  });

}

/* =========================
   CLOSE POPUP
========================= */

document.getElementById("cancelBtn").onclick = () => {

  document.getElementById("formPopup").style.display = "none";

  document.body.style.overflow = "";
};

/* =========================
   SAVE BOOKING
========================= */

document.getElementById("confirmBtn").onclick = async () => {

  const name =
    document.getElementById("name").value;

  const email =
    document.getElementById("email").value;

  const tel =
    document.getElementById("tel").value;

  if(!name || !tel){

    alert("Name and phone required");

    return;
  }

  await updateDoc(doc(db,"stages",selectedDoc),{

    assignedTo:name,
    email:email,
    tel:tel

  });

  alert("Reserved!");

  location.reload();
};
function scaleCanvas(){

  const canvas =
    document.getElementById("mainCanvas");

  const viewport =
    document.getElementById("viewport");

  const scale =
    window.innerWidth / 1080;

  canvas.style.transform =
    `scale(${scale})`;

  const scaledHeight =
    1920 * scale;

  viewport.style.height =
    scaledHeight + "px";

  document.body.style.height =
    scaledHeight + "px";
}

window.addEventListener("resize", scaleCanvas);

scaleCanvas();
loadStages();

</script>
</div>
</body>
</html>
